<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>べちこのAIアウトプット集</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<header>
  <h1>べちこのAIアウトプット集</h1>
  <p>生成AIで作ったものをまとめています</p>
</header>

<div class="controls">
  <div class="type-filter">
    <button class="type-btn" data-type="image">画像</button>
    <button class="type-btn" data-type="html">HTMLサイト</button>
  </div>
  <div class="divider"></div>
  <div id="tag-filters" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
</div>

<div class="gallery" id="gallery"></div>

<div id="modal" class="modal" role="dialog" aria-modal="true">
  <button class="modal-close" id="modal-close" aria-label="閉じる">&times;</button>
  <img class="modal-img" id="modal-img" src="" alt="">
</div>

<script src="script.js?v=2"></script>
</body>
</html>
